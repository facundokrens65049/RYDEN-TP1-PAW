<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${htmlLang}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="***REMOVED***{mail.riderReturnCheckout.emailTitle}">Return now</title>
</head>
<body style="margin:0; padding:0; background-color:***REMOVED***eef2ff;
             font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
             color:***REMOVED***1e1b4b;">

<div style="max-width:620px; margin:40px auto; padding:0 20px 40px;">

    <div style="padding:36px 0 28px;">
        <span style="font-size:22px; font-weight:800; color:***REMOVED***1e1b4b;"><img src="cid:logo"
                                                                           alt="Ryden"
                                                                           style="height:32px; width:auto; vertical-align:middle;"/> Ryden</span>
    </div>

    <p style="font-size:16px; font-weight:700; color:***REMOVED***3730a3; margin-bottom:6px;"
       th:text="***REMOVED***{mail.riderReturnCheckout.emailTitle}">
        Return now
    </p>
    <p style="font-size:14px; color:***REMOVED***4b5563; line-height:1.6; margin-bottom:0;"
       th:text="***REMOVED***{mail.common.greeting(${riderFullName})}">
        Hello,
    </p>

    <p style="font-size:14px; color:***REMOVED***374151; line-height:1.6; margin-bottom:20px;"
       th:text="***REMOVED***{mail.riderReturnCheckout.intro}">
        Intro
    </p>

    <hr style="border:none; border-top:1px solid ***REMOVED***d1d5db; margin:20px 0;"/>

    <div style="background:***REMOVED***ffffff; border:1px solid ***REMOVED***e5e7eb; border-radius:10px;
                padding:20px; margin-bottom:24px;">

        <div style="display:flex; justify-content:space-between; align-items:flex-start;
                  padding:10px 0; border-top:1px solid ***REMOVED***f3f4f6; font-size:13px;">
            <span style="color:***REMOVED***6b7280;" th:text="***REMOVED***{mail.riderReturnReminder.vehicle}">Vehicle</span>
            <span style="font-weight:600; color:***REMOVED***1e1b4b; text-align:right; max-width:65%;" th:text="${vehicleLabel}">—</span>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-start;
                  padding:10px 0; border-top:1px solid ***REMOVED***f3f4f6; font-size:13px;">
            <span style="color:***REMOVED***6b7280;" th:text="***REMOVED***{mail.riderReturnReminder.ownerEmail}">Owner</span>
            <span style="font-weight:600; color:***REMOVED***1e1b4b; text-align:right; max-width:65%; word-break:break-all;" th:text="${ownerEmail}">—</span>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-start;
                  padding:10px 0; border-top:1px solid ***REMOVED***f3f4f6; font-size:13px;">
            <span style="color:***REMOVED***6b7280;" th:text="***REMOVED***{mail.riderReturnReminder.checkout}">Checkout</span>
            <span style="font-weight:600; color:***REMOVED***1e1b4b; text-align:right; max-width:65%;" th:text="${checkoutFormatted}">—</span>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:flex-start;
                  padding:10px 0; border-top:1px solid ***REMOVED***f3f4f6; font-size:13px;">
            <span style="color:***REMOVED***6b7280;" th:text="***REMOVED***{mail.riderReturnReminder.location}">Location</span>
            <span style="font-weight:600; color:***REMOVED***1e1b4b; text-align:right; max-width:65%; white-space:pre-wrap;" th:text="${returnLocationLine}">—</span>
        </div>
    </div>

    <div style="margin-bottom:20px;">
        <a th:href="${ctaUrl}"
           style="display:inline-block; padding:12px 24px; background-color:***REMOVED***4338ca;
                color:***REMOVED***ffffff; text-decoration:none; border-radius:8px;
                font-size:14px; font-weight:600;"
           th:text="***REMOVED***{mail.riderReturnCheckout.viewReservation}">
            View reservation
        </a>
    </div>

    <hr style="border:none; border-top:1px solid ***REMOVED***d1d5db; margin:20px 0;"/>
    <p style="font-size:12px; color:***REMOVED***9ca3af; line-height:1.8;"
       th:text="***REMOVED***{mail.common.footer}">
        Footer
    </p>

    <p style="font-size:18px; color:***REMOVED***9ca3af; letter-spacing:2px; margin-top:16px;">···</p>

</div>
</body>
</html>
